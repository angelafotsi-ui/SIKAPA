<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharge Account - SIKAPA</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            padding: 1rem;
        }

        .deposit-card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 2.5rem;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-button {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #667eea;
            text-decoration: none;
            margin-bottom: 1.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-button:hover {
            color: #764ba2;
        }

        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .card-subtitle {
            font-size: 1rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .card-description {
            font-size: 0.95rem;
            color: #777;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.7rem;
        }

        .amount-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 0.7rem;
            margin-bottom: 0.5rem;
        }

        .amount-btn {
            padding: 1rem;
            border: 2px solid #e0e0e0;
            background: white;
            color: #333;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .amount-btn:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateY(-2px);
        }

        .amount-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .custom-amount-section {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: #f0f0ff;
            border-radius: 8px;
        }

        .custom-amount-section.show {
            display: block;
        }

        .custom-amount-input {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .custom-amount-input input {
            flex: 1;
            padding: 0.8rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .custom-amount-input input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.2);
        }

        .custom-amount-currency {
            font-weight: 700;
            color: #667eea;
            font-size: 1.1rem;
        }

        .custom-amount-help {
            font-size: 0.85rem;
            color: #999;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .info-banner {
            background: #f0f0ff;
            border-left: 4px solid #667eea;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            margin-top: 1.5rem;
        }

        .info-banner-text {
            color: #667eea;
            font-size: 0.9rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }

        .customer-fields {
            background: #f9f9ff;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }

        .customer-fields .form-group {
            margin-bottom: 1rem;
        }

        .customer-fields .form-group:last-child {
            margin-bottom: 0;
        }

        .form-input {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.2);
        }

        .form-input::placeholder {
            color: #999;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 0.4rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .submit-button {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .submit-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .submit-button:active {
            transform: translateY(0);
        }

        .button-icon {
            margin-right: 0.5rem;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.7rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-message {
            background: #d5f4e6;
            border-left: 4px solid #27ae60;
            color: #27ae60;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .error-box {
            background: #fadbd8;
            border-left: 4px solid #e74c3c;
            color: #c0392b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .error-box.show {
            display: block;
        }

        @media (max-width: 480px) {
            .deposit-card {
                padding: 1.5rem;
            }

            .card-title {
                font-size: 1.5rem;
            }

            .card-icon {
                font-size: 2.5rem;
            }

            .amount-grid {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }

            .deposit-card {
                border-radius: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="deposit-card">
        <a class="back-button" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Back
        </a>

        <div class="card-header">
            <div class="card-icon">💰</div>
            <h1 class="card-title">RECHARGE ACCOUNT</h1>
            <p class="card-subtitle">Your deposit will be credited instantly</p>
        </div>

        <form id="depositForm">
            <!-- Success Message -->
            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i> Processing payment...
            </div>

            <!-- Error Message -->
            <div class="error-box" id="errorBox"></div>

            <!-- Amount Selection -->
            <div class="form-group">
                <label class="form-label">Select Amount *</label>
                <div class="amount-grid">
                    <button type="button" class="amount-btn" data-amount="30" onclick="selectAmount(30)">
                        ₵30
                    </button>
                    <button type="button" class="amount-btn" data-amount="100" onclick="selectAmount(100)">
                        ₵100
                    </button>
                    <button type="button" class="amount-btn" data-amount="250" onclick="selectAmount(250)">
                        ₵250
                    </button>
                    <button type="button" class="amount-btn" data-amount="500" onclick="selectAmount(500)">
                        ₵500
                    </button>
                    <button type="button" class="amount-btn" data-amount="custom" onclick="selectAmount('custom')">
                        💡 Custom
                    </button>
                </div>

                <!-- Custom Amount Input -->
                <div class="custom-amount-section" id="customAmountSection">
                    <div class="custom-amount-input">
                        <span class="custom-amount-currency">₵</span>
                        <input 
                            type="number" 
                            id="customAmountInput" 
                            placeholder="Enter amount (min ₵1)"
                            min="1"
                            step="0.01"
                            onchange="updateCustomAmount()">
                    </div>
                    <div class="custom-amount-help">
                        <i class="fas fa-info-circle"></i>
                        Minimum amount: ₵1.00
                    </div>
                </div>

                <div class="error-message" id="amountError"></div>
                <input type="hidden" id="selectedAmount" value="">
            </div>

            <!-- Info Banner -->
            <div class="info-banner">
                <p class="info-banner-text">
                    <i class="fas fa-credit-card"></i>
                    Instant payment via card or mobile money
                </p>
            </div>

            <!-- Customer Information -->
            <div class="customer-fields">
                <div class="form-group">
                    <label class="form-label" for="customerEmail">Email Address *</label>
                    <input 
                        type="email" 
                        id="customerEmail" 
                        class="form-input"
                        placeholder="Enter your email address"
                        required>
                    <div class="error-message" id="customerEmailError"></div>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-button" id="submitBtn">
                <span class="button-icon">💳</span>
                <span id="submitText">Make Payment Now</span>
            </button>
        </form>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const apiBase = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api'
            : 'https://sikapa-q2i0.onrender.com/api';

        // Check user authentication on page load
        document.addEventListener('DOMContentLoaded', function() {
            if (!isUserLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            // Set form submission handler
            document.getElementById('depositForm').addEventListener('submit', handlePayment);

            // Pre-fill customer name if available
            const userEmail = localStorage.getItem('userEmail') || localStorage.getItem('email');
            if (userEmail) {
                document.getElementById('customerEmail').value = userEmail;
            }
        });

        function selectAmount(amount) {
            // Remove active class from all buttons
            document.querySelectorAll('.amount-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Add active class to clicked button
            event.target.classList.add('active');

            // Show/hide custom amount input
            const customSection = document.getElementById('customAmountSection');
            if (amount === 'custom') {
                customSection.classList.add('show');
                document.getElementById('selectedAmount').value = '';
                document.getElementById('customAmountInput').focus();
            } else {
                customSection.classList.remove('show');
                document.getElementById('selectedAmount').value = amount;
            }
            
            clearError('amountError');
        }

        function updateCustomAmount() {
            const customInput = document.getElementById('customAmountInput');
            const amount = parseFloat(customInput.value);

            if (!customInput.value) {
                clearError('amountError');
                return;
            }

            if (isNaN(amount) || amount < 1) {
                showError('amountError', 'Minimum amount is ₵1.00');
                return;
            }

            document.getElementById('selectedAmount').value = amount;
            clearError('amountError');
        }

        function clearError(elementId) {
            const errorElement = document.getElementById(elementId);
            if (errorElement) {
                errorElement.textContent = '';
                errorElement.classList.remove('show');
            }
        }

        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.classList.add('show');
            }
        }

        function showErrorBox(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = message;
            errorBox.classList.add('show');
            setTimeout(() => {
                errorBox.classList.remove('show');
            }, 5000);
        }

        async function handlePayment(e) {
            e.preventDefault();

            // Clear all error messages
            document.getElementById('errorBox').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
            clearError('amountError');
            clearError('customerEmailError');

            // Get form values
            const amount = document.getElementById('selectedAmount').value;
            const customerEmail = document.getElementById('customerEmail').value.trim();

            // Validation
            if (!amount) {
                showError('amountError', 'Please select an amount');
                return;
            }

            const amountNum = parseFloat(amount);
            if (isNaN(amountNum) || amountNum < 1) {
                showError('amountError', 'Amount must be at least ₵1.00');
                return;
            }

            if (!customerEmail) {
                showError('customerEmailError', 'Email address is required');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(customerEmail)) {
                showError('customerEmailError', 'Please enter a valid email address');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');

            try {
                submitBtn.disabled = true;
                submitText.innerHTML = '<span class="loading-spinner"></span>Processing...';

                // Get userId
                const userId = localStorage.getItem('userId') || localStorage.getItem('user_uid');

                // Get the base URL for return URL
                const baseUrl = window.location.origin || 'http://localhost:3000';
                const returnUrl = `${baseUrl}/deposit-success.html?amount=${parseFloat(amount)}&reference={reference}`;

                // Make API call to initiate HUBTEL payment
                const response = await fetch(`${apiBase}/deposit/hubtel/initiate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('authToken') || localStorage.getItem('auth_token')}`
                    },
                    body: JSON.stringify({
                        userId: userId,
                        customerEmail: customerEmail,
                        amount: parseFloat(amount),
                        returnUrl: returnUrl
                    })
                });

                const data = await response.json();

                if (response.ok && data.success && data.paymentUrl) {
                    document.getElementById('successMessage').classList.add('show');
                    
                    // Redirect to HUBTEL payment gateway
                    setTimeout(() => {
                        window.location.href = data.paymentUrl;
                    }, 1500);
                } else {
                    showErrorBox(data.message || 'Failed to initiate payment. Please try again.');
                    submitBtn.disabled = false;
                    submitText.innerHTML = '💳 Make Payment Now';
                }
            } catch (error) {
                console.error('Payment error:', error);
                showErrorBox('An error occurred: ' + error.message);
                submitBtn.disabled = false;
                submitText.innerHTML = '💳 Make Payment Now';
            }
        }

        function goBack() {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
