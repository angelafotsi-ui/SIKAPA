<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - SIKAPA</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .deposit-container {
            max-width: 600px;
            margin: 3rem auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .deposit-container h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        .deposit-subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
            font-size: 1rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .momo-info {
            background: #f0f0ff;
            border-left: 4px solid #667eea;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 2rem;
        }

        .momo-info h3 {
            color: #667eea;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .momo-info p {
            color: #333;
            margin: 0.3rem 0;
        }

        .momo-number {
            font-weight: bold;
            font-size: 1.1rem;
            color: #667eea;
        }

        .momo-name {
            font-weight: bold;
            color: #333;
        }

        .amount-section {
            margin-bottom: 1.5rem;
        }

        .amount-quick-select {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .amount-btn {
            padding: 0.8rem;
            border: 2px solid #ddd;
            background: white;
            color: #333;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .amount-btn:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .amount-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 5px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f9f9f9;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .upload-area.active {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .upload-area p {
            color: #666;
            margin: 0.5rem 0;
        }

        .upload-icon {
            font-size: 2.5rem;
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .file-name {
            color: #667eea;
            font-weight: bold;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .upload-hint {
            font-size: 0.85rem;
            color: #999;
            margin-top: 0.3rem;
        }

        .submit-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 2rem;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        .submit-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 0.3rem;
            padding: 0.5rem;
            background: #fadbd8;
            border-radius: 5px;
        }

        .success-message {
            color: #27ae60;
            font-size: 0.9rem;
            margin-top: 0.3rem;
            padding: 0.5rem;
            background: #d5f4e6;
            border-radius: 5px;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
        }

        .info-box p {
            color: #1565c0;
            margin: 0;
            font-size: 0.9rem;
        }

        .back-button {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #667eea;
            text-decoration: none;
            margin-bottom: 1rem;
            cursor: pointer;
            font-weight: 500;
        }

        .back-button:hover {
            color: #764ba2;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .deposit-container {
                margin: 1rem;
                padding: 1.5rem;
            }

            .amount-quick-select {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="deposit-container">
        <a class="back-button" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Back
        </a>

        <h1>💰 Confirm Deposit</h1>
        <p class="deposit-subtitle">Send funds to the account below</p>

        <div class="info-box">
            <p><i class="fas fa-info-circle"></i> Your deposit will be credited within 1 - 5 minutes</p>
        </div>

        <form id="depositForm">
            <!-- SIKAPA SHORTCODE Section -->
            <div class="momo-info">
                <h3>📱 Dial this SIKAPA shortcode to make payment</h3>
                <p class="form-group">
                    <label>SHORTCODE *</label>
                    <input type="text" id="momoNumber" value="713*4624#" readonly>
                </p>
                <p class="form-group">
                    <label>SHORTCODE Name *</label>
                    <input type="text" id="momoName" value="SIKAPA GHANA LIMITED" readonly>
                </p>
            </div>

            <!-- Sender Name -->
            <div class="form-group">
                <label for="senderName">Name of Sender *</label>
                <input type="text" id="senderName" placeholder="Enter the Sender Name" required>
                <span class="error-message" id="senderNameError"></span>
            </div>

            <!-- Sender Number -->
            <div class="form-group">
                <label for="senderNumber">Sender Number *</label>
                <input type="text" id="senderNumber" placeholder="Enter the Sender Number" required>
                <span class="error-message" id="senderNumberError"></span>
            </div>

            <!-- Amount Selection -->
            <div class="amount-section">
                <label>Amount *</label>
                <div class="amount-quick-select">
                    <button type="button" class="amount-btn" data-amount="30" onclick="selectAmount(30)">₵30</button>
                    <button type="button" class="amount-btn" data-amount="100" onclick="selectAmount(100)">₵100</button>
                    <button type="button" class="amount-btn" data-amount="250" onclick="selectAmount(250)">₵250</button>
                    <button type="button" class="amount-btn" data-amount="500" onclick="selectAmount(500)">₵500</button>
                </div>
                <input type="hidden" id="selectedAmount" value="">
                <span class="error-message" id="amountError"></span>
            </div>

            <!-- Screenshot Upload -->
            <div class="form-group">
                <label for="screenshotUpload">Upload Screenshot *</label>
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('screenshotUpload').click()">
                    <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                    <p style="font-weight: 600; color: #333;">Click to upload or drag and drop</p>
                    <p class="upload-hint">PNG, JPG, or GIF (max. 5MB)</p>
                    <p class="file-name" id="fileName"></p>
                </div>
                <input type="file" id="screenshotUpload" accept="image/png,image/jpeg,image/gif" style="display: none;" required>
                <span class="error-message" id="screenshotError"></span>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-button" id="submitBtn">
                <span id="submitText">Confirm Deposit</span>
            </button>

            <span class="success-message" id="successMessage" style="display: none;"></span>
            <span class="error-message" id="formError" style="display: none;"></span>
        </form>

    <script src="js/auth.js"></script>
    <script>
        const apiBase = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api'
            : 'https://sikapa-q2i0.onrender.com/api';

        let selectedFile = null;

        // Check user authentication
        document.addEventListener('DOMContentLoaded', function() {
            if (!isUserLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            // Setup drag and drop for file upload
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('screenshotUpload');

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('active');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('active');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('active');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFileSelection(files[0]);
                    fileInput.files = files;
                }
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFileSelection(e.target.files[0]);
                }
            });

            // Form submission
            document.getElementById('depositForm').addEventListener('submit', submitDeposit);
        });

        function selectAmount(amount) {
            // Remove active class from all buttons
            document.querySelectorAll('.amount-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Add active class to clicked button
            event.target.classList.add('active');
            document.getElementById('selectedAmount').value = amount;
            document.getElementById('amountError').textContent = '';
        }

        function handleFileSelection(file) {
            // Validate file
            const maxSize = 5 * 1024 * 1024; // 5MB
            const allowedTypes = ['image/png', 'image/jpeg', 'image/gif'];

            if (!allowedTypes.includes(file.type)) {
                document.getElementById('screenshotError').textContent = 'Only PNG, JPG, or GIF files are allowed';
                return;
            }

            if (file.size > maxSize) {
                document.getElementById('screenshotError').textContent = 'File size must be less than 5MB';
                return;
            }

            selectedFile = file;
            document.getElementById('fileName').textContent = `✓ ${file.name}`;
            document.getElementById('screenshotError').textContent = '';
        }

        async function submitDeposit(e) {
            e.preventDefault();

            // Clear previous messages
            document.getElementById('formError').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';

            // Validate inputs
            const senderName = document.getElementById('senderName').value.trim();
            const senderNumber = document.getElementById('senderNumber').value.trim();
            const amount = document.getElementById('selectedAmount').value;

            if (!senderName) {
                document.getElementById('senderNameError').textContent = 'Sender name is required';
                return;
            }

            if (!senderNumber) {
                document.getElementById('senderNumberError').textContent = 'Sender number is required';
                return;
            }

            if (!amount) {
                document.getElementById('amountError').textContent = 'Please select an amount';
                return;
            }

            if (!selectedFile) {
                document.getElementById('screenshotError').textContent = 'Please upload a screenshot';
                return;
            }

            // Clear error messages
            document.getElementById('senderNameError').textContent = '';
            document.getElementById('senderNumberError').textContent = '';
            document.getElementById('amountError').textContent = '';
            document.getElementById('screenshotError').textContent = '';

            // Create FormData for file upload
            const formData = new FormData();
            formData.append('userId', localStorage.getItem('userId') || localStorage.getItem('user_uid'));
            formData.append('senderName', senderName);
            formData.append('senderNumber', senderNumber);
            formData.append('amount', parseFloat(amount));
            formData.append('momoNumber', '713*4624#');
            formData.append('momoName', 'SIKAPA GHANA LIMITED');
            formData.append('screenshot', selectedFile);

            try {
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.disabled = true;
                document.getElementById('submitText').innerHTML = '<span class="loading-spinner"></span>Processing...';

                const response = await fetch(`${apiBase}/deposit/submit`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('authToken') || localStorage.getItem('auth_token')}`
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    document.getElementById('successMessage').style.display = 'block';
                    document.getElementById('successMessage').textContent = '✓ Deposit request submitted successfully! Your admin will review it soon.';

                    // Reset form
                    document.getElementById('depositForm').reset();
                    document.getElementById('selectedAmount').value = '';
                    document.getElementById('fileName').textContent = '';
                    selectedFile = null;
                    document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('active'));

                    // Redirect to dashboard after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    document.getElementById('formError').style.display = 'block';
                    document.getElementById('formError').textContent = data.message || 'Failed to submit deposit request';
                }
            } catch (error) {
                console.error('Error submitting deposit:', error);
                document.getElementById('formError').style.display = 'block';
                document.getElementById('formError').textContent = 'Error submitting deposit: ' + error.message;
            } finally {
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.disabled = false;
                document.getElementById('submitText').innerHTML = 'Confirm Deposit';
            }
        }

        function goBack() {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
