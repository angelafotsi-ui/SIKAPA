<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="true">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#37017a">
    <title>Log In - Sikapa</title>
    <link rel="stylesheet" href="css/auth.css">
    <style>
        /* Activity Notification Dropdown Styles - HIGHLY VISIBLE */
        .notification-container {
          position: fixed;
          top: 80px;
          left: 50%;
          transform: translateX(-50%);
          z-index: 9999;
          display: flex;
          flex-direction: column;
          gap: 12px;
          width: 100%;
          max-width: 600px;
          padding: 0 20px;
          pointer-events: none;
        }

        .notification-item {
          pointer-events: auto;
          background: linear-gradient(135deg, #37017a 0%, #5b22b6 100%);
          color: white;
          padding: 16px 20px;
          border-radius: 12px;
          box-shadow: 0 20px 60px rgba(55, 1, 122, 0.4);
          display: flex;
          align-items: center;
          gap: 16px;
          animation: slideDown 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
          cursor: pointer;
          border: 1px solid rgba(255, 255, 255, 0.3);
          backdrop-filter: blur(10px);
          transition: all 0.3s ease;
        }

        .notification-item:hover {
          transform: translateY(-3px);
          box-shadow: 0 30px 80px rgba(55, 1, 122, 0.5);
          border-color: rgba(255, 255, 255, 0.5);
        }

        .notification-item.removing {
          animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .notification-icon {
          font-size: 24px;
          flex-shrink: 0;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .notification-text {
          flex: 1;
          font-size: 15px;
          font-weight: 600;
          line-height: 1.4;
          letter-spacing: 0.3px;
        }

        .notification-close {
          background: rgba(255, 255, 255, 0.25);
          border: none;
          color: white;
          width: 32px;
          height: 32px;
          border-radius: 50%;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          flex-shrink: 0;
          transition: all 0.3s;
          font-size: 20px;
          font-weight: bold;
          padding: 0;
          line-height: 1;
        }

        .notification-close:hover {
          background: rgba(255, 255, 255, 0.4);
        }

        @keyframes slideDown {
          0% {
            opacity: 0;
            transform: translateY(-50px);
          }
          100% {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes slideUp {
          0% {
            opacity: 1;
            transform: translateY(0);
          }
          100% {
            opacity: 0;
            transform: translateY(-50px);
          }
        }

        @media (max-width: 600px) {
          .notification-container {
            top: 60px;
            padding: 0 15px;
            max-width: calc(100% - 30px);
          }
          
          .notification-item {
            padding: 14px 16px;
            gap: 12px;
          }
          
          .notification-icon {
            font-size: 20px;
          }
          
          .notification-text {
            font-size: 14px;
          }
          
          .notification-close {
            width: 28px;
            height: 28px;
            font-size: 18px;
          }
        }
    </style>
</head>
<body>
    <!-- Activity Notification Dropdown -->
    <div class="notification-container" id="notificationContainer"></div>
    
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1>Sikapa</h1>
                <p>Welcome Back</p>
            </div>

            <form id="login-form" class="auth-form">
                <!-- Email Field -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-button">Log In</button>

                <!-- Status Message -->
                <div id="status-message"></div>
            </form>

            <!-- Links -->
            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', handleLogin);

        async function ensureBalanceInitialized(userId) {
            try {
                const apiBase = window.location.hostname === 'localhost' 
                    ? 'http://localhost:3000/api'
                    : 'https://sikapa-q2i0.onrender.com/api';
                
                const response = await fetch(`${apiBase}/balance/ensure-initialized/${userId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                if (data.success) {
                    console.log('[Login] Balance initialized/verified:', data.message);
                    if (data.isNew) {
                        console.log('[Login] New user received GH 10 welcome bonus');
                    } else {
                        console.log('[Login] Existing user balance verified');
                    }
                } else {
                    console.error('[Login] Failed to ensure balance initialization:', data.message);
                }
            } catch (error) {
                console.error('[Login] Error ensuring balance initialization:', error);
                // Don't fail login if balance check fails
            }
        }

        async function handleLogin(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('status-message');

            try {
                const apiBase = window.location.hostname === 'localhost' 
                    ? 'http://localhost:3000/api'
                    : 'https://sikapa-q2i0.onrender.com/api';
                
                const response = await fetch(`${apiBase}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    statusDiv.innerHTML = '<div class="success">✓ Login successful! Redirecting...</div>';
                    // Store user info in localStorage
                    localStorage.setItem('user_uid', data.uid);
                    localStorage.setItem('userId', data.uid);
                    localStorage.setItem('user_email', data.email);
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('user_name', data.displayName);
                    if (data.customToken) {
                        localStorage.setItem('auth_token', data.customToken);
                        localStorage.setItem('authToken', data.customToken);
                    }
                    
                    // Store user data
                    localStorage.setItem('user_data', JSON.stringify({
                        name: data.displayName || '',
                        email: data.email,
                        createdAt: new Date().toISOString()
                    }));
                    
                    // Ensure balance is initialized (for first-time login bonus)
                    ensureBalanceInitialized(data.uid);
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    statusDiv.innerHTML = `<div class="error">✗ ${data.message}</div>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="error">✗ Error: ${error.message}</div>`;
            }
        }
    </script>
    <script src="js/activity-notifications.js"></script>
</body>
</html>
